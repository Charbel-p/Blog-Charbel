# Deploiement gratuit sur Render (alternative avec PostgreSQL)
# https://render.com — plan Free (le site se met en veille apres inactivite)
services:
  - type: web
    name: blog-charbel
    runtime: docker
    plan: free
    healthCheckPath: /up
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: LOG_CHANNEL
        value: stderr
      - key: SESSION_DRIVER
        value: database
      - key: CACHE_STORE
        value: database
      - key: QUEUE_CONNECTION
        value: database
      - key: DB_CONNECTION
        value: pgsql
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        sync: false
      - key: DB_URL
        fromDatabase:
          name: blog-charbel-db
          property: connectionString

databases:
  - name: blog-charbel-db
    plan: free
    databaseName: blog_charbel
    user: blog_charbel
